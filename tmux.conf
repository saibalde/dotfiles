# change prefix ================================================================

set -g prefix C-a
unbind C-b

# enable colors ================================================================

set -g default-terminal "screen-256color"

# vi keybindings ===============================================================

set-window-option -g mode-keys vi

# split panes using | and - ====================================================
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# split switching ==============================================================

bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

# split resizing ===============================================================

bind h resize-pane -L 10
bind j resize-pane -D 10
bind k resize-pane -U 10
bind l resize-pane -R 10

# statusbar ====================================================================

set -g status-left ''
set -g status-right '#[bg=black,fg=brightblue] %Y-%m-%d %H:%M '

# for tmux version < 2.1

#set -g message-bg black
#set -g message-fg brightblue

#set -g status-bg black
#set -g status-fg brightblue

#setw -g window-status-bg black
#setw -g window-status-fg brightblue

#setw -g window-status-current-bg black
#setw -g window-status-current-fg brightcyan
#setw -g window-status-attr bold

# for tmux version >= 2.1

set -g message-style 'bg=black fg=brightblue'
set -g status-style 'bg=black fg=brightblue'
setw -g window-status-style 'bg=black fg=brightblue'
setw -g window-status-current-style 'bg=black fg=brightcyan bold'
