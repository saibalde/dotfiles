# enable colors
set -g default-terminal "screen-256color"

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# split switching
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

# split resizing
bind h resize-pane -L 10
bind j resize-pane -D 10
bind k resize-pane -U 10
bind l resize-pane -R 10

# statusbar
set -g status-left ''
set -g status-right '#[bg=#999999,fg=#333333, bold] %Y-%m-%d %H:%M '

set -g status-style 'bg=#cccccc fg=#666666'

setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-current-style 'bg=#999999 fg=#333333 bold'

setw -g window-status-format ' #I:#W#F '
setw -g window-status-style 'bg=#cccccc fg=#666666'

set -g message-style 'bg=#cccccc fg=#666666 bold'
