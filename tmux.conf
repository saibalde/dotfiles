# change prefix ================================================================

set-option -g prefix C-a
unbind C-b

# enable vi keybindings ========================================================

set-window-option -g mode-keys vi

# colors =======================================================================

set-option -g default-terminal "screen-256color"

# for tmux version < 2.1
#set-option -g status-fg yellow
#set-option -g status-bg white

#set-window-option -g window-status-fg brightyellow
#set-window-option -g window-status-bg default
#set-window-option -g window-status-current-fg brightred
#set-window-option -g window-status-current-bg default

#set-option -g pane-border-fg white
#set-option -g pane-active-border-fg brightcyan

#set-option -g message-fg brightred
#set-option -g message-bg white

#set-option -g display-panes-active-colour blue
#set-option -g display-panes-colour brightred

#set-window-option -g clock-mode-colour green

#set-window-option -g window-status-bell-fg white
#set-window-option -g window-status-bell-bg red

# for tmux version >= 2.1
set-option -g status-style fg=yellow,bg=white

set-window-option -g window-status-style fg=brightyellow,bg=default
set-window-option -g window-status-current-style fg=brightred,bg=default

set-option -g pane-border-style fg=white
set-option -g pane-active-border-style fg=brightcyan

set-option -g message-style fg=brightred,bg=white

set-option -g display-panes-active-colour blue
set-option -g display-panes-colour brightred

set-window-option -g clock-mode-colour green

set-window-option -g window-status-bell-style fg=white,bg=red

# statusbar ====================================================================

set-option -g status-left ''
set-option -g status-right '%Y-%m-%d %H:%M '

# split panes using | and - ====================================================

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# split switching ==============================================================

bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

# split resizing ===============================================================

bind h resize-pane -L 10
bind j resize-pane -D 10
bind k resize-pane -U 10
bind l resize-pane -R 10
